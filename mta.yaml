_schema-version: 3.3.0
ID: DocumentIntelligenceService
description: A simple CAP project.
version: 1.0.0
modules:
  - name: DocumentIntelligenceService-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: DocumentIntelligenceService-db
      - name: DocumentIntelligenceService-destination
      - name: uaa_DocumentIntelligenceService
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci
  - name: DocumentIntelligenceService-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: DocumentIntelligenceService-db
    parameters:
      buildpack: nodejs_buildpack
  - name: DocumentIntelligenceService-destination-content
    type: com.sap.application.content
    requires:
      - name: DocumentIntelligenceService-destination
        parameters:
          content-target: true
      - name: DocumentIntelligenceService_html_repo_host
        parameters:
          service-key:
            name: DocumentIntelligenceService_html_repo_host-key
      - name: uaa_DocumentIntelligenceService
        parameters:
          service-key:
            name: uaa_DocumentIntelligenceService-key
    parameters:
      content:
        instance:
          destinations:
            - Name: DocumentIntelligenceService_DocumentIntelligenceService_html_repo_host
              ServiceInstanceName: DocumentIntelligenceService-html5-app-host-service
              ServiceKeyName: DocumentIntelligenceService_html_repo_host-key
              sap.cloud.service: DocumentIntelligenceService
            - Authentication: OAuth2UserTokenExchange
              Name: DocumentIntelligenceService_uaa_DocumentIntelligenceService
              ServiceInstanceName: DocumentIntelligenceService-xsuaa-service
              ServiceKeyName: uaa_DocumentIntelligenceService-key
              sap.cloud.service: DocumentIntelligenceService
          existing_destinations_policy: ignore
    build-parameters:
      no-source: true
  - name: DocumentIntelligenceService-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: DocumentIntelligenceService_html_repo_host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - artifacts:
            - documentintelligenceui.zip
          name: documentintelligenceui
          target-path: resources/
  - name: documentintelligenceui
    type: html5
    path: app/document_intelligence_ui
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms:
        []
resources:
  - name: DocumentIntelligenceService-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
  - name: DocumentIntelligenceService-destination
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
              - Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
                Name: srv-api
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
            existing_destinations_policy: update
      service: destination
      service-plan: lite
    requires:
      - name: srv-api
  - name: DocumentIntelligenceService_html_repo_host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: DocumentIntelligenceService-html5-app-host-service
      service-plan: app-host
  - name: uaa_DocumentIntelligenceService
    type: org.cloudfoundry.managed-service
    parameters:
      path: ./xs-security.json
      service: xsuaa
      service-name: DocumentIntelligenceService-xsuaa-service
      service-plan: application
parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true
build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production
