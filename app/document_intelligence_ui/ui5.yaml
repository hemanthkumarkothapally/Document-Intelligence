specVersion: "4.0"
metadata:
  name: documentintelligenceui
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertErrors: false # If set to true, certificate errors will be ignored. E.g. self-signed certificates will be accepted
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://sapui5.hana.ondemand.com
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
builder:
  resources:
    excludes:
      - "/test/**"

  bundles:
    - bundleDefinition:
        name: documentintelligenceui/Component-preload.js
        defaultFileTypes: [.js, .xml, .json, .properties]
        sections:
          - mode: preload
            filters:
              - documentintelligenceui/**